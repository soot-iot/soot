# Shared service containers for the local end-to-end integration
# reproducer (scripts/integration_e2e.sh) and the GHA workflow at
# .github/workflows/integration.yml.
#
# Postgres   — OLTP store backing soot_core, ash_pki, etc.
# ClickHouse — OLAP store for soot_telemetry ingest.
#
# Brokers are kept in sibling files (`docker-compose.emqx.yml`,
# `docker-compose.mosquitto.yml`) so the EMQX and Mosquitto runs share
# nothing beyond this base — adding a feature to one broker can't
# accidentally touch the other.
#
# Run locally with one of:
#   docker compose -f scripts/docker-compose.base.yml -f scripts/docker-compose.emqx.yml      up -d --wait
#   docker compose -f scripts/docker-compose.base.yml -f scripts/docker-compose.mosquitto.yml up -d --wait
#
# Ports default to the values the README's Quickstart assumes (5432,
# 8123, 1883). Override via SOOT_E2E_*_PORT env vars when coexisting
# with other instances on the host.

services:
  postgres:
    image: postgres:16
    container_name: soot_e2e_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soot_e2e_dev
    ports:
      - "127.0.0.1:${SOOT_E2E_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: soot_e2e_clickhouse
    environment:
      CLICKHOUSE_USER: soot
      CLICKHOUSE_PASSWORD: soot
      CLICKHOUSE_DB: telemetry
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "127.0.0.1:${SOOT_E2E_CH_HTTP_PORT:-8123}:8123"
      - "127.0.0.1:${SOOT_E2E_CH_TCP_PORT:-9000}:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        - CMD-SHELL
        - "wget --quiet --tries=1 --spider http://localhost:8123/ping || exit 1"
      interval: 5s
      timeout: 5s
      retries: 20
    tmpfs:
      - /var/lib/clickhouse
