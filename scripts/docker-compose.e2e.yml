# Service containers for the local end-to-end integration reproducer
# (scripts/integration_e2e.sh) and the GHA workflow at
# .github/workflows/integration.yml.
#
# Postgres   — OLTP store backing soot_core, ash_pki, etc.
# EMQX       — MQTT broker for the device-facing MQTT pipeline.
# ClickHouse — OLAP store for soot_telemetry ingest.
#
# Run locally with:
#   docker compose -f scripts/docker-compose.e2e.yml up -d --wait
#   docker compose -f scripts/docker-compose.e2e.yml down -v
#
# All ports bind to localhost only — this is a developer reproducer,
# not a deployment artifact. Host ports are intentionally non-default
# so this stack coexists with other Postgres / EMQX / ClickHouse
# instances a dev might be running. Override with the SOOT_E2E_*_PORT
# env vars (read by integration_e2e.sh).

services:
  postgres:
    image: postgres:16
    container_name: soot_e2e_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soot_e2e_dev
    ports:
      - "127.0.0.1:${SOOT_E2E_POSTGRES_PORT:-25432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  # Brokers are profile-gated: pick one with `--profile emqx` or
  # `--profile mosquitto` (or `--profile all` to bring up both).
  # The script defaults to emqx; SOOT_E2E_BROKER=mosquitto switches.
  emqx:
    image: emqx/emqx:5.8.0
    container_name: soot_e2e_emqx
    profiles: ["emqx", "all"]
    environment:
      EMQX_ALLOW_ANONYMOUS: "true"
      EMQX_LOG__CONSOLE_HANDLER__LEVEL: warning
      # Default API key for the dashboard so the integration script
      # can push rules + ACLs without bootstrapping credentials.
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: soot_e2e_admin
    ports:
      - "127.0.0.1:${SOOT_E2E_EMQX_MQTT_PORT:-21883}:1883"
      - "127.0.0.1:${SOOT_E2E_EMQX_MQTTS_PORT:-28883}:8883"
      - "127.0.0.1:${SOOT_E2E_EMQX_DASH_PORT:-28083}:18083"
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 12

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: soot_e2e_mosquitto
    profiles: ["mosquitto", "all"]
    # Anonymous + open by default. Real ACLs / mTLS get pushed in
    # via mix soot.broker.gen_config + a bind mount in CI.
    command:
      - sh
      - -c
      - |
        printf 'listener 1883\nallow_anonymous true\n' > /mosquitto/config/mosquitto.conf
        exec /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf
    ports:
      - "127.0.0.1:${SOOT_E2E_MOSQUITTO_PORT:-21884}:1883"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t healthcheck -W 1 -E || true"]
      interval: 5s
      timeout: 5s
      retries: 12

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: soot_e2e_clickhouse
    environment:
      CLICKHOUSE_USER: soot
      CLICKHOUSE_PASSWORD: soot
      CLICKHOUSE_DB: telemetry
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "127.0.0.1:${SOOT_E2E_CH_HTTP_PORT:-28123}:8123"
      - "127.0.0.1:${SOOT_E2E_CH_TCP_PORT:-29000}:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        - CMD-SHELL
        - "wget --quiet --tries=1 --spider http://localhost:8123/ping || exit 1"
      interval: 5s
      timeout: 5s
      retries: 20
    tmpfs:
      - /var/lib/clickhouse
