name: Integration (E2E)

# Full end-to-end integration test for the Soot framework. Generates
# a backend and a Nerves device project from scratch by running the
# README's Quickstart literally — no path-deps, no `mix.exs` patching.
# Brings up real Postgres / EMQX-or-Mosquitto / ClickHouse, builds a
# qemu_aarch64 firmware, boots it, and asserts wire-level protocol
# behavior.
#
# This is the gate that says "an evaluator following the README's
# Quickstart from zero will end up with bits flowing." See
# INTEGRATION-SPEC.md in the soot meta-package for the full design.
#
# EMQX and Mosquitto are split into independent matrix legs that
# share only `scripts/integration_e2e.sh` and
# `scripts/docker-compose.base.yml`. Each broker has its own overlay
# (`docker-compose.emqx.yml` / `docker-compose.mosquitto.yml`) so a
# change to one broker can't accidentally touch the other.
#
# Most of the work happens inside `scripts/integration_e2e.sh` —
# this workflow is a thin wrapper around the same stages a developer
# runs locally. If a step fails, reproduce locally with:
#
#   SOOT_E2E_BROKER=emqx ./scripts/integration_e2e.sh setup
#   SOOT_E2E_BROKER=emqx ./scripts/integration_e2e.sh gen-backend
#   SOOT_E2E_BROKER=emqx ./scripts/integration_e2e.sh seed
#   SOOT_E2E_BROKER=emqx ./scripts/integration_e2e.sh start-backend
#   SOOT_E2E_BROKER=emqx ./scripts/integration_e2e.sh gen-device
#   SOOT_E2E_BROKER=emqx ./scripts/integration_e2e.sh build-firmware
#   SOOT_E2E_BROKER=emqx ./scripts/integration_e2e.sh boot-and-test

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'priv/**'
      - 'scripts/integration_e2e.sh'
      - 'scripts/docker-compose.*.yml'
      - '.github/workflows/integration.yml'
  pull_request:
    paths:
      - 'lib/**'
      - 'priv/**'
      - 'scripts/integration_e2e.sh'
      - 'scripts/docker-compose.*.yml'
      - '.github/workflows/integration.yml'
  schedule:
    # Weekly nightly run to catch hex / Nerves system drift even when
    # nothing in this repo changes.
    - cron: '0 4 * * 0'
  workflow_dispatch:

# Cancel superseded runs on the same ref so a fast-typed PR doesn't
# pile up multi-minute integration runs.
concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (${{ matrix.broker }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        broker: [emqx, mosquitto]

    env:
      MIX_ENV: dev
      SOOT_E2E_BROKER: ${{ matrix.broker }}
      # On PR runs, point `--install soot@github:soot-iot/soot@<ref>`
      # at the PR's head SHA so the test exercises the code under
      # review, not whatever's already on main. On push/schedule
      # runs, fall back to the branch ref. soot-iot/soot must be
      # public for fork PRs to resolve this; that's already the case.
      SOOT_E2E_REF: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Checkout soot meta-package
        uses: actions/checkout@v4

      # Nerves projects' generated config.exs reads ~/.ssh/*.pub at
      # compile time to populate authorized_keys for the firmware's
      # ssh subsystem. Without one, `mix deps.get` for the device
      # bails. The key never leaves the runner; it exists only to
      # make the generated config valid.
      - name: Generate SSH key for Nerves authorized_keys
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -C "soot-e2e@runner"

      - name: Install OS deps (qemu, nerves build deps, postgres-client)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-arm \
            postgresql-client \
            libmnl-dev \
            libssl-dev \
            automake \
            autoconf \
            build-essential \
            pkg-config
          # libmnl-dev is needed by nerves_uevent (compiled at
          # `mix deps.compile` time on the host target before
          # firmware crossbuilds). The other build tools are needed
          # by various Nerves transitive C deps. ClickHouse client
          # is unnecessary on the host — the script shells through
          # docker exec for any CH commands.

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18.4"
          otp-version: "28.3.2"

      - name: Install igniter_new + phx_new + nerves_bootstrap archives
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix archive.install --force hex igniter_new
          mix archive.install --force hex phx_new
          mix archive.install --force hex nerves_bootstrap

      # ---- Caches: hex + per-broker generated builds + Nerves system ----
      - name: Restore Hex cache
        uses: actions/cache@v4
        with:
          path: ~/.hex
          key: hex-${{ runner.os }}-${{ matrix.broker }}-${{ hashFiles('mix.lock') }}
          restore-keys: hex-${{ runner.os }}-${{ matrix.broker }}-

      - name: Restore /tmp/soot_e2e build caches (backend + device)
        uses: actions/cache@v4
        with:
          path: |
            /tmp/soot_e2e/my_iot/_build
            /tmp/soot_e2e/my_iot/deps
            /tmp/soot_e2e/my_device/_build
            /tmp/soot_e2e/my_device/deps
          # Cache key must invalidate when soot's deps change. The
          # generated project's mix.lock isn't on disk yet; the soot
          # meta-package's mix.lock pins all transitive github SHAs
          # we'd resolve through `--install soot@github:...`, so it's
          # the right invalidation signal.
          key: e2e-build-${{ runner.os }}-${{ matrix.broker }}-${{ hashFiles('mix.lock') }}
          restore-keys: e2e-build-${{ runner.os }}-${{ matrix.broker }}-

      - name: Restore Nerves system cache (qemu_aarch64 buildroot)
        uses: actions/cache@v4
        with:
          path: |
            ~/.nerves
          key: nerves-qemu-aarch64-${{ runner.os }}
          restore-keys: nerves-qemu-aarch64-

      # ---- Stages ----

      - name: Stage — setup (docker compose up)
        run: ./scripts/integration_e2e.sh setup

      - name: Stage — gen-backend
        run: ./scripts/integration_e2e.sh gen-backend

      - name: Stage — seed (PKI init + ash.setup + demo seed + device cert)
        run: ./scripts/integration_e2e.sh seed

      - name: Stage — start-backend
        run: ./scripts/integration_e2e.sh start-backend

      - name: Stage — gen-device
        run: ./scripts/integration_e2e.sh gen-device

      - name: Stage — build-firmware
        run: ./scripts/integration_e2e.sh build-firmware

      - name: Stage — boot-and-test
        run: ./scripts/integration_e2e.sh boot-and-test

      # ---- Failure diagnostics ----

      - name: Backend log (on failure)
        if: failure()
        run: |
          echo "::group::backend.log"
          cat /tmp/soot_e2e/backend.log 2>/dev/null || echo "(no backend.log)"
          echo "::endgroup::"

      - name: Service container logs (on failure)
        if: failure()
        run: |
          for svc in soot_e2e_postgres soot_e2e_emqx soot_e2e_mosquitto soot_e2e_clickhouse; do
            echo "::group::$svc"
            docker logs --tail 200 "$svc" 2>&1 || echo "(no $svc container)"
            echo "::endgroup::"
          done

      - name: Generated backend tree (on failure)
        if: failure()
        run: |
          echo "::group::backend tree"
          (cd /tmp/soot_e2e/my_iot 2>/dev/null && find . -type f \
              -not -path './deps/*' -not -path './_build/*' \
              | head -100) || echo "(no backend dir)"
          echo "::endgroup::"

      # ---- Always: teardown (drop containers, leave caches alone) ----

      - name: Teardown
        if: always()
        env:
          SOOT_E2E_KEEP_TMP: "1"   # keep /tmp/soot_e2e so cache can persist
        run: ./scripts/integration_e2e.sh teardown
